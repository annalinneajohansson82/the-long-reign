<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Long Reign</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #1a1a2e;
      }
      #game-container {
        position: fixed;
        inset: 0;
      }
      #ui-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #ui-overlay > * {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="ui-overlay"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
